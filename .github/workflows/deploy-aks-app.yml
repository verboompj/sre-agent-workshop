# Deploys the workshop web application to AKS.
# Substitutes Azure resource values into K8s manifests and applies them.
# Manual dispatch only — ensures the workload name matches your actual deployment.
name: Deploy AKS Application

on:
  workflow_dispatch:
    inputs:
      workloadName:
        description: 'Workload name (must match the infra deployment)'
        type: string
        default: srelab

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORKLOAD: ${{ inputs.workloadName || vars.WORKLOAD_NAME || 'srelab' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "rg-${{ env.WORKLOAD }}" \
            --name "${{ env.WORKLOAD }}-aks"

      - name: Fetch deployment values from Azure
        id: values
        run: |
          UAMI_CLIENT_ID=$(az identity show \
            --name "${{ env.WORKLOAD }}-id" \
            --resource-group "rg-${{ env.WORKLOAD }}" \
            --query clientId -o tsv)

          COSMOS_ENDPOINT=$(az cosmosdb list \
            --resource-group "rg-${{ env.WORKLOAD }}" \
            --query "[0].documentEndpoint" -o tsv)

          echo "uami_client_id=$UAMI_CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "cosmos_endpoint=$COSMOS_ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Apply Kubernetes manifests
        env:
          AZURE_CLIENT_ID: ${{ steps.values.outputs.uami_client_id }}
          COSMOSDB_ENDPOINT: ${{ steps.values.outputs.cosmos_endpoint }}
        run: |
          # Derive the repo owner (lowercase) for the container image reference
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # Namespace first
          kubectl apply -f workshops/aks/k8s/namespace.yaml

          # ServiceAccount — substitute the UAMI client ID
          sed "s|\${AZURE_CLIENT_ID}|${AZURE_CLIENT_ID}|g" workshops/aks/k8s/service-account.yaml \
            | kubectl apply -f -

          # Deployment — substitute CosmosDB endpoint and image owner
          sed -e "s|\${COSMOSDB_ENDPOINT}|${COSMOSDB_ENDPOINT}|g" \
              -e "s|OWNER|${OWNER}|g" \
              workshops/aks/k8s/deployment.yaml \
            | kubectl apply -f -

          # Service
          kubectl apply -f workshops/aks/k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/web-app -n workshop --timeout=120s

      - name: Print app URL
        run: |
          echo "Waiting for external IP (up to 60s)..."
          for i in $(seq 1 12); do
            IP=$(kubectl get svc web-app -n workshop -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$IP" ]; then
              break
            fi
            sleep 5
          done

          echo "============================================"
          echo "  Application Deployment Complete"
          echo "============================================"
          if [ -n "$IP" ]; then
            echo "App URL:  http://${IP}"
            echo "Health:   http://${IP}/health"
            echo "Items:    http://${IP}/items"
          else
            echo "External IP not yet assigned."
            echo "Run: kubectl get svc web-app -n workshop"
          fi
          echo "============================================"
