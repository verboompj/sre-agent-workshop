# Deploys VM workshop infrastructure (Windows Server VMs, IIS, monitoring, Bastion) to Azure.
# Manual dispatch only — participants choose their region, workload name, and admin user.
# Bicep syntax + what-if validation is handled by validate-vm-infra.yml.
name: Deploy VM Infrastructure

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        type: choice
        options:
          - eastus2
          - swedencentral
          - australiaeast
        default: eastus2
      workloadName:
        description: 'Workload name'
        type: string
        default: srelabvm
      adminUsername:
        description: 'Windows VM admin username'
        type: string
        default: azureuser

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'eastus2' }}
      WORKLOAD: ${{ inputs.workloadName || vars.WORKLOAD_NAME || 'srelabvm' }}
      ADMIN_USERNAME: ${{ inputs.adminUsername || 'azureuser' }}
      ADMIN_PASSWORD: ${{ secrets.VM_ADMIN_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate VM admin password secret
        run: |
          if [ -z "${ADMIN_PASSWORD}" ]; then
            echo "::error::Missing repository secret VM_ADMIN_PASSWORD"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name "rg-${{ env.WORKLOAD }}" \
            --location "${{ env.LOCATION }}" \
            --tags workshop=sre-agent environment=demo track=vm

      - name: Deploy VM Bicep template
        id: deploy
        run: |
          az deployment group create \
            --resource-group "rg-${{ env.WORKLOAD }}" \
            --template-file workshops/vm/infra/bicep/main.bicep \
            --parameters workshops/vm/infra/bicep/main.bicepparam \
              location="${{ env.LOCATION }}" \
              workloadName="${{ env.WORKLOAD }}" \
              adminUsername="${{ env.ADMIN_USERNAME }}" \
              adminPassword="${{ env.ADMIN_PASSWORD }}" \
            --query 'properties.outputs' \
            -o json > vm-deployment-outputs.json

          cat vm-deployment-outputs.json
          echo "vm_names=$(jq -rc '.vmNames.value' vm-deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "vm_private_ips=$(jq -rc '.vmPrivateIps.value' vm-deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "law_id=$(jq -r '.logAnalyticsWorkspaceId.value' vm-deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "bastion_name=$(jq -r '.bastionName.value' vm-deployment-outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Print deployment summary
        run: |
          echo "============================================"
          echo "  VM Infrastructure Deployment Complete"
          echo "============================================"
          echo "Resource Group:    rg-${{ env.WORKLOAD }}"
          echo "Location:          ${{ env.LOCATION }}"
          echo "VM Names:          ${{ steps.deploy.outputs.vm_names }}"
          echo "VM Private IPs:    ${{ steps.deploy.outputs.vm_private_ips }}"
          echo "Bastion Host:      ${{ steps.deploy.outputs.bastion_name }}"
          echo "Log Analytics ID:  ${{ steps.deploy.outputs.law_id }}"
          echo "============================================"
          echo ""
          echo "Next: follow workshops/vm/docs for scenario execution."

