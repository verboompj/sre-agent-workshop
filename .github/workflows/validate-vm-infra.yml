# Validates VM workshop Bicep on push/PR — syntax check, plus what-if preview when secrets are configured.
# Push/PR-triggered to keep contributors fast; the actual deploy happens via deploy-vm-infra.yml.
name: Validate VM Infrastructure

on:
  push:
    branches: [main]
    paths: ['workshops/vm/infra/**']
  pull_request:
    paths: ['workshops/vm/infra/**']

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      WORKLOAD: ${{ vars.WORKLOAD_NAME || 'srelabvm' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate VM Bicep syntax
        run: az bicep build --file workshops/vm/infra/bicep/main.bicep --stdout > /dev/null

      - name: Azure Login
        id: azure-login
        uses: azure/login@v2
        continue-on-error: true
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: What-If VM deployment preview
        if: steps.azure-login.outcome == 'success' && secrets.VM_ADMIN_PASSWORD != ''
        run: |
          az deployment group what-if \
            --resource-group "rg-${{ env.WORKLOAD }}" \
            --template-file workshops/vm/infra/bicep/main.bicep \
            --parameters workshops/vm/infra/bicep/main.bicepparam \
              location="${{ env.LOCATION }}" \
              workloadName="${{ env.WORKLOAD }}" \
              adminPassword="${{ secrets.VM_ADMIN_PASSWORD }}"

      - name: Skip notice
        if: steps.azure-login.outcome != 'success' || secrets.VM_ADMIN_PASSWORD == ''
        run: |
          echo "::notice::Azure credentials or VM_ADMIN_PASSWORD not configured — skipped what-if preview. Bicep syntax validation passed."

