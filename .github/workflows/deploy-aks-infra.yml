# Deploys Bicep infrastructure (AKS, CosmosDB, monitoring, identity) to Azure.
# Manual dispatch only — participants choose their region and workload name explicitly.
# Push-based validation (syntax check + what-if) is handled by validate-infra.yml.
name: Deploy AKS Infrastructure

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        type: choice
        options:
          - eastus2
          - swedencentral
          - australiaeast
        default: eastus2
      workloadName:
        description: 'Workload name (used in resource naming)'
        type: string
        default: srelab

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LOCATION: ${{ inputs.location || vars.AZURE_LOCATION || 'eastus2' }}
      WORKLOAD: ${{ inputs.workloadName || vars.WORKLOAD_NAME || 'srelab' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name "rg-${{ env.WORKLOAD }}" \
            --location "${{ env.LOCATION }}" \
            --tags workshop=sre-agent environment=demo

      - name: Deploy Bicep template
        id: deploy
        run: |
          az deployment group create \
            --resource-group "rg-${{ env.WORKLOAD }}" \
            --template-file workshops/aks/infra/bicep/main.bicep \
            --parameters workshops/aks/infra/bicep/main.bicepparam \
              location="${{ env.LOCATION }}" \
              workloadName="${{ env.WORKLOAD }}" \
            --query 'properties.outputs' \
            -o json > deployment-outputs.json

          cat deployment-outputs.json

          # Capture key outputs for subsequent steps
          echo "aks_name=$(jq -r '.aksClusterName.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "cosmos_endpoint=$(jq -r '.cosmosDbEndpoint.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "uami_client_id=$(jq -r '.uamiClientId.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "law_id=$(jq -r '.logAnalyticsWorkspaceId.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"
          echo "appinsights_cs=$(jq -r '.appInsightsConnectionString.value' deployment-outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Print deployment summary
        run: |
          echo "============================================"
          echo "  Infrastructure Deployment Complete"
          echo "============================================"
          echo "Resource Group:      rg-${{ env.WORKLOAD }}"
          echo "Location:            ${{ env.LOCATION }}"
          echo "AKS Cluster:         ${{ steps.deploy.outputs.aks_name }}"
          echo "CosmosDB Endpoint:   ${{ steps.deploy.outputs.cosmos_endpoint }}"
          echo "UAMI Client ID:     ${{ steps.deploy.outputs.uami_client_id }}"
          echo "Log Analytics ID:    ${{ steps.deploy.outputs.law_id }}"
          echo "============================================"
          echo ""
          echo "Next: Run the 'Deploy Application' workflow to deploy the app to AKS."
