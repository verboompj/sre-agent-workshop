# Service exposing the web-app deployment via an Azure Load Balancer.
# External traffic on port 80 is forwarded to the app containers on port 3000.
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: workshop
  labels:
    app: web-app
spec:
  type: LoadBalancer
  selector:
    app: web-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
