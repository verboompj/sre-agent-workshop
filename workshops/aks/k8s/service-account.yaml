# ServiceAccount used by the web-app pods to authenticate to Azure via workload identity.
# The federated credential in Bicep (identity.bicep) binds this ServiceAccount
# (name: workshop-app, namespace: workshop) to the User-Assigned Managed Identity.
# These names must match exactly.
#
# Placeholder: ${AZURE_CLIENT_ID} — replaced at deploy time with the UAMI client ID
# output from the Bicep deployment.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workshop-app
  namespace: workshop
  annotations:
    # Client ID of the User-Assigned Managed Identity created by Bicep
    azure.workload.identity/client-id: "${AZURE_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"
